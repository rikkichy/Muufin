name: muufin
description: Muufin — Jellyfin music client (Android/Windows) — playlists, artists, albums, playback
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # motion
  animations: ^2.0.11

  # storage
  flutter_secure_storage: ^10.0.0

  # ui/utils
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  path_provider: ^2.1.5

  # Material 3 dynamic color (Android 12+) + harmonization
  dynamic_color: ^1.8.1

  # audio
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.1.0
  media_kit_libs_windows_audio: any
  audio_service: ^0.18.15
  audio_session: ^0.1.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
